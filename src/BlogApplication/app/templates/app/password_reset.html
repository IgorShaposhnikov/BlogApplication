{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container py-5">
    <div class="card p-4 mx-auto shadow" style="max-width: 500px;">
        <h3 class="text-center">Reset Password</h3>
        <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary btn-block mt-3" type="submit">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
