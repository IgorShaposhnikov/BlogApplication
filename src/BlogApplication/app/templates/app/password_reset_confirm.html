{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container py-5">
    <div class="card p-4 mx-auto shadow" style="max-width: 500px;">
        <h3 class="text-center">Set New Password</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-success btn-block mt-3" type="submit">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
